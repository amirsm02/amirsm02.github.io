<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Astrophotography image gallery">
  <title>Gallery | Amir Shapour Mohammadi</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0d0d;
      --panel: #151515;
      --text: #f2f2f2;
      --muted: #a8a8a8;
      --line: #4a4a4a;
      --accent: #0f4567;
      --gap: 12px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    button, input { font: inherit; }

    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 18px clamp(12px, 2vw, 28px);
      border-bottom: 1px solid #242424;
    }

    .site-header h1 {
      margin: 0;
      font-size: clamp(1.15rem, 2.2vw, 1.75rem);
      letter-spacing: .01em;
    }

    .home-link {
      color: var(--text);
      text-decoration: none;
    }

    .home-link:hover { text-decoration: underline; }

    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 15px clamp(10px, 1.5vw, 22px);
      background: rgba(13, 13, 13, .96);
      border-bottom: 1px solid #252525;
      backdrop-filter: blur(8px);
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .filter-button,
    .sort-button {
      min-height: 31px;
      padding: 5px 9px;
      color: var(--text);
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 0;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
    }

    .filter-button:hover,
    .sort-button:hover,
    .filter-button.active,
    .sort-button.active {
      background: var(--accent);
      border-color: var(--accent);
    }

    .utility-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-top: 13px;
    }

    .search {
      width: min(420px, 100%);
      padding: 9px 11px;
      color: var(--text);
      background: var(--panel);
      border: 1px solid #444;
      outline: none;
    }

    .search:focus { border-color: #ddd; }

    .sort-controls {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      font-size: .78rem;
      font-weight: 700;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      grid-auto-flow: row;
      grid-auto-rows: 8px;
      gap: var(--gap);
      padding: var(--gap);
      align-items: start;
    }

    .gallery-card {
      position: relative;
      display: block;
      width: 100%;
      margin: 0;
      overflow: hidden;
      background: #111;
      cursor: pointer;
      break-inside: avoid;
    }

    .gallery-card[hidden] { display: none; }

    .gallery-card img {
      display: block;
      width: 100%;
      height: auto;
      min-height: 180px;
      object-fit: cover;
      transition: transform .35s ease, filter .35s ease;
    }

    .gallery-card:hover img {
      transform: scale(1.018);
      filter: brightness(.92);
    }

    .card-overlay {
      position: absolute;
      inset: auto 0 0;
      min-height: 70px;
      padding: 20px 16px;
      background: rgba(0, 80, 106, 0.78);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity .25s ease, transform .25s ease, background-color .25s ease;
      pointer-events: none;
      backdrop-filter: blur(2px);
    }

    .gallery-card:hover .card-overlay,
    .gallery-card:focus-visible .card-overlay {
      opacity: 1;
      transform: translateY(0);
      background: rgba(0, 103, 135, 0.82);
    }

    .card-title {
      margin: 0;
      font-size: 1rem;
      line-height: 1.25;
    }

    .card-category {
      margin-top: 4px;
      color: #d2d2d2;
      font-size: .76rem;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .empty-state {
      display: none;
      padding: 60px 20px;
      color: var(--muted);
      text-align: center;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 22px;
      background: rgba(0, 0, 0, .94);
    }

    .lightbox.open { display: grid; }

    .lightbox-dialog {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(250px, 340px);
      width: min(1400px, 100%);
      max-height: 92vh;
      background: #111;
      border: 1px solid #333;
      overflow: hidden;
    }

    .lightbox-image-wrap {
      display: grid;
      place-items: center;
      min-height: 55vh;
      background: #050505;
    }

    .lightbox-image {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 92vh;
      object-fit: contain;
    }

    .lightbox-copy {
      padding: 26px 24px;
      overflow-y: auto;
    }

    .lightbox-copy h2 {
      margin: 0 38px 8px 0;
      font-size: 1.45rem;
      line-height: 1.2;
    }

    .lightbox-copy .category {
      margin-bottom: 22px;
      color: var(--muted);
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .1em;
    }

    .lightbox-copy pre {
      margin: 0;
      color: #d3d3d3;
      font: .92rem/1.65 Arial, Helvetica, sans-serif;
      white-space: pre-wrap;
    }

    .close-button {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 2;
      width: 38px;
      height: 38px;
      color: white;
      background: rgba(0,0,0,.62);
      border: 1px solid #666;
      cursor: pointer;
      font-size: 1.45rem;
      line-height: 1;
    }

    @media (max-width: 1200px) {
      .gallery { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }

    @media (max-width: 800px) {
      .utility-row {
        align-items: stretch;
        flex-direction: column;
      }

      .sort-controls { justify-content: flex-end; }

      .gallery { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .lightbox {
        padding: 8px;
        overflow-y: auto;
      }

      .lightbox-dialog {
        display: block;
        max-height: none;
      }

      .lightbox-image-wrap { min-height: 0; }

      .lightbox-image {
        width: 100%;
        height: auto;
        max-height: 70vh;
      }
    }

    @media (max-width: 480px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 8px;
      }

      .filter-button, .sort-button {
        font-size: .72rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

    const gallery = document.getElementById("gallery");
    const filters = document.getElementById("filters");
    const search = document.getElementById("search");

    const lightbox = document.getElementById("lightbox");

    const closeLightboxButton = document.getElementById("closeLightbox");

    let activeCategory = "View All";
    let activeSort = "rank";
    let lastFocusedCard = null;

    const categoryOrder = [
      "Emission Nebula",
      "Reflection Nebula",
      "Galaxy",
      "Galaxy Cluster",
      "Globular Cluster",
      "Solar System",
      "Wide-field"
    ];

    const categories = [
      "View All",
      ...categoryOrder.filter(category =>
        imageData.some(item => item.category === category)
      )
    ];

    function makeButton(label) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "filter-button";
      button.textContent = label;
      button.dataset.category = label;
      button.classList.toggle("active", label === activeCategory);
      button.addEventListener("click", () => {
        activeCategory = label;
        document.querySelectorAll(".filter-button").forEach(btn => {
          btn.classList.toggle("active", btn.dataset.category === label);
        });
        renderGallery();
      });
      return button;
    }

    categories.forEach(category => filters.appendChild(makeButton(category)));

    function visibleItems() {
      const query = search.value.trim().toLowerCase();

      return imageData
        .filter(item => activeCategory === "View All" || item.category === activeCategory)
        .filter(item => {
          const haystack = `${item.title} ${item.category} ${item.details}`.toLowerCase();
          return haystack.includes(query);
        })
        .sort((a, b) => {
          if (activeSort === "date") {
            return b.date.localeCompare(a.date) || a.rank - b.rank;
          }
          const categoryDifference =
            categoryOrder.indexOf(a.category) - categoryOrder.indexOf(b.category);

          return categoryDifference || a.rank - b.rank;
        });
    }

    function resizeGridItem(card) {
      const rowHeight = parseFloat(getComputedStyle(gallery).getPropertyValue("grid-auto-rows"));
      const rowGap = parseFloat(getComputedStyle(gallery).getPropertyValue("row-gap"));
      const image = card.querySelector("img");

      if (!image.complete || image.naturalWidth === 0) return;

      const renderedHeight = image.getBoundingClientRect().height;
      const rowSpan = Math.ceil((renderedHeight + rowGap) / (rowHeight + rowGap));
      card.style.gridRowEnd = `span ${rowSpan}`;
    }

    function resizeAllGridItems() {
      gallery.querySelectorAll(".gallery-card").forEach(resizeGridItem);
    }

    function getThumbnailPath(fullResolutionPath) {
      return fullResolutionPath
        .replace(/^\.\/astro\//, "./astro_thumbnails/")
        .replace(/^\/astro\//, "/astro_thumbnails/")
        .replace(/^astro\//, "astro_thumbnails/");
    }

    function renderGallery() {
      const items = visibleItems();
      gallery.replaceChildren();

      items.forEach((item, index) => {
        const card = document.createElement("article");
        card.className = "gallery-card";
        card.tabIndex = 0;
        card.setAttribute("role", "button");
        card.setAttribute("aria-label", `Open ${item.title}`);

        const image = document.createElement("img");
        image.src = item.thumb ?? getThumbnailPath(item.src);
        image.alt = item.title;
        image.loading = index < 8 ? "eager" : "lazy";
        image.fetchPriority = index < 4 ? "high" : "auto";
        image.decoding = "async";

        // Fall back to the full-resolution image if a thumbnail is missing.
        image.addEventListener("error", () => {
          if (image.src !== new URL(item.src, document.baseURI).href) {
            image.src = item.src;
          }
        }, { once: true });

        image.addEventListener("load", () => resizeGridItem(card));

        const overlay = document.createElement("div");
        overlay.className = "card-overlay";
        overlay.innerHTML = `
          <h2 class="card-title">${escapeHtml(item.title)}</h2>
          <div class="card-category">${escapeHtml(item.category)}</div>
        `;

        card.append(image, overlay);
        card.addEventListener("click", () => openLightbox(item, card));
        card.addEventListener("keydown", event => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            openLightbox(item, card);
          }
        });

        gallery.appendChild(card);
        requestAnimationFrame(() => resizeGridItem(card));
      });

      emptyState.style.display = items.length ? "none" : "block";
      requestAnimationFrame(resizeAllGridItems);
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function openLightbox(item, card) {
      lastFocusedCard = card;
      lightboxImage.src = item.src;
      lightboxImage.alt = item.title;
      lightboxTitle.textContent = item.title;
      lightboxCategory.textContent = item.category;
      lightboxDetails.textContent = item.details;
      lightbox.classList.add("open");
      document.body.style.overflow = "hidden";
      closeLightboxButton.focus();
    }

    function closeLightbox() {
      lightbox.classList.remove("open");
      lightboxImage.src = "";
      document.body.style.overflow = "";
      lastFocusedCard?.focus();
    }

    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(resizeAllGridItems, 100);
    });

    search.addEventListener("input", renderGallery);

    document.querySelectorAll(".sort-button").forEach(button => {
      button.addEventListener("click", () => {
        activeSort = button.dataset.sort;
        document.querySelectorAll(".sort-button").forEach(btn => {
          btn.classList.toggle("active", btn === button);
        });
        renderGallery();
      });
    });

    closeLightboxButton.addEventListener("click", closeLightbox);

    lightbox.addEventListener("click", event => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape" && lightbox.classList.contains("open")) {
        closeLightbox();
      }
    });

    renderGallery();
  </script>
</body>
</html>
